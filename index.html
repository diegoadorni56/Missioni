<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MISSIONI">
<title>STELLAR MISSIONS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap');
:root {
  --bg:#020812;--bg2:#060f1e;--bg3:#0a1628;--panel:#0d1f35;--panel2:#112240;
  --accent:#00d4ff;--accent2:#7b2fff;--accent3:#ff6b35;--gold:#ffd700;
  --green:#00ff88;--red:#ff3366;--orange:#ff9500;
  --text:#c8e0f4;--text2:#6a8fa8;--text3:#3a5a78;
  --border:#1a3a5c;--border2:#0f2a44;
  --glow:0 0 20px rgba(0,212,255,0.3);--glow2:0 0 30px rgba(123,47,255,0.4);
  --glow-gold:0 0 20px rgba(255,215,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden;padding-bottom:80px}
#starfield{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.8}}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}

.header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,rgba(2,8,18,0.98) 0%,rgba(6,15,30,0.95) 100%);border-bottom:1px solid var(--border);padding:12px 16px 10px;backdrop-filter:blur(20px)}
.header-top{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cycle-badge{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);background:var(--panel);border:1px solid var(--border);padding:4px 8px;border-radius:4px}
.budget-bar{margin-top:10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 12px;display:flex;align-items:center;gap:12px}
.budget-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:1px;white-space:nowrap}
.budget-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border2)}
.budget-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width 0.6s ease;box-shadow:0 0 8px var(--accent)}
.budget-amount{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--gold);text-shadow:var(--glow-gold);white-space:nowrap}

.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(2,8,18,0.97);border-top:1px solid var(--border);display:flex;backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:transparent;color:var(--text3);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.2s;text-transform:uppercase}
.nav-btn .icon{font-size:18px}
.nav-btn.active{color:var(--accent)}
.nav-btn.active .icon{text-shadow:var(--glow)}

.view{display:none;padding:16px;position:relative;z-index:1}
.view.active{display:block}

.section-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--text2);text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:block;width:3px;height:14px;background:var(--accent);border-radius:2px;box-shadow:var(--glow)}

.mission-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;transition:border-color 0.2s;position:relative}
.mission-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px}
.mission-card.cat-asp::before{background:var(--accent);box-shadow:var(--glow)}
.mission-card.cat-social::before{background:var(--accent2);box-shadow:var(--glow2)}
.mission-card.cat-1pct::before{background:var(--green);box-shadow:0 0 10px rgba(0,255,136,0.4)}
.mission-card.completed{opacity:0.6;border-color:var(--border2)}
.mission-card.completed::before{background:var(--text3);box-shadow:none}
.mission-card.expired{opacity:0.5;border-color:rgba(255,51,102,0.3)}
.mission-card.expired::before{background:var(--red);box-shadow:none}

.mission-header{padding:12px 14px 10px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;cursor:pointer}
.mission-info{flex:1;min-width:0}
.mission-name{font-family:'Orbitron',monospace;font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3}
.mission-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.tag-asp{background:rgba(0,212,255,0.1);color:var(--accent);border:1px solid rgba(0,212,255,0.2)}
.tag-social{background:rgba(123,47,255,0.1);color:var(--accent2);border:1px solid rgba(123,47,255,0.2)}
.tag-1pct{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2)}
.tag-freq{background:rgba(255,107,53,0.1);color:var(--accent3);border:1px solid rgba(255,107,53,0.2)}
.tag-expired{background:rgba(255,51,102,0.1);color:var(--red);border:1px solid rgba(255,51,102,0.2)}
.tag-suspended{background:rgba(255,149,0,0.1);color:var(--orange);border:1px solid rgba(255,149,0,0.2)}

.mission-reward{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:var(--gold);text-shadow:var(--glow-gold);white-space:nowrap}

.mission-xp{padding:0 14px 10px 16px}
.xp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.xp-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px}
.xp-level{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--accent)}
.xp-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;border-radius:2px;transition:width 0.5s ease}
.cat-asp .xp-fill{background:linear-gradient(90deg,#0088aa,var(--accent));box-shadow:0 0 6px var(--accent)}
.cat-social .xp-fill{background:linear-gradient(90deg,#4a1aaa,var(--accent2));box-shadow:0 0 6px var(--accent2)}
.cat-1pct .xp-fill{background:linear-gradient(90deg,#00aa55,var(--green));box-shadow:0 0 6px var(--green)}
.completed .xp-fill,.expired .xp-fill{background:var(--text3);box-shadow:none}

.mission-detail{display:none;padding:12px 14px;border-top:1px solid var(--border2);background:var(--bg2)}
.mission-detail.open{display:block}

.detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border2);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-key{color:var(--text2);font-weight:500}
.detail-val{font-family:'Share Tech Mono',monospace;color:var(--text);font-size:12px}

.milestones{margin:10px 0}
.milestone-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border2);cursor:pointer}
.milestone-item:last-child{border-bottom:none}
.ms-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--text3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.2s}
.ms-check.done{background:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(0,255,136,0.5)}
.ms-check.missed{background:rgba(255,51,102,0.2);border-color:var(--red)}
.ms-label{font-size:13px;color:var(--text);flex:1}
.ms-label.done{text-decoration:line-through;color:var(--text3)}
.ms-date{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3)}

.action-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:1px;padding:8px 12px;border-radius:6px;border:none;cursor:pointer;text-transform:uppercase;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:white;box-shadow:var(--glow)}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{background:transparent;color:var(--accent3);border:1px solid var(--accent3)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-success{background:linear-gradient(135deg,#00aa55,var(--green));color:var(--bg);box-shadow:0 0 15px rgba(0,255,136,0.4)}
.btn-sm{padding:5px 8px;font-size:8px}
.btn-gold{background:linear-gradient(135deg,#aa8800,var(--gold));color:var(--bg)}

.timer-display{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:10px 0;display:flex;align-items:center;justify-content:space-between}
.timer-digits{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--accent);text-shadow:var(--glow);letter-spacing:2px}
.timer-digits.running{color:var(--green);text-shadow:0 0 15px rgba(0,255,136,0.6)}
.timer-btns{display:flex;gap:6px}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(2,8,18,0.92);z-index:200;backdrop-filter:blur(10px);align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--panel2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:400px;box-shadow:0 0 60px rgba(0,212,255,0.15);margin:auto}
.modal-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--accent);display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 4px}
.modal-body{padding:16px}

.form-group{margin-bottom:14px}
.form-label{display:block;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;padding:10px 12px;outline:none;transition:border-color 0.2s;-webkit-appearance:none;appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(0,212,255,0.15)}
.form-textarea{min-height:60px;resize:vertical}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px}
.form-hint.warning{color:var(--orange)}
.form-hint.error{color:var(--red)}

.budget-setup-card{background:linear-gradient(135deg,rgba(123,47,255,0.15),rgba(0,212,255,0.1));border:1px solid var(--accent2);border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.budget-setup-title{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--accent2);letter-spacing:2px;margin-bottom:8px}
.budget-setup-sub{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.stat-val{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:var(--accent);text-shadow:var(--glow)}
.stat-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:4px;text-transform:uppercase}

.suspended-card{background:rgba(255,149,0,0.08);border:1px solid rgba(255,149,0,0.3);border-radius:10px;padding:14px;margin-bottom:14px}
.suspended-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--orange);letter-spacing:2px;margin-bottom:10px}
.suspended-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,149,0,0.15);font-size:12px}
.suspended-item:last-child{border-bottom:none}
.suspended-amount{font-family:'Orbitron',monospace;font-size:13px;color:var(--orange)}

.cycle-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.cycle-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--accent2);letter-spacing:2px;margin-bottom:10px}
.cycle-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border2);font-size:13px}
.cycle-row:last-child{border-bottom:none}

.history-item{background:var(--panel);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.history-name{font-size:13px;color:var(--text);font-weight:600}
.history-meta{font-size:11px;color:var(--text3);margin-top:2px;font-family:'Share Tech Mono',monospace}
.history-reward{font-family:'Orbitron',monospace;font-size:14px;color:var(--gold)}
.history-reward.lost{color:var(--red)}
.history-reward.suspended{color:var(--orange)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--accent);border-radius:8px;padding:10px 18px;z-index:300;font-family:'Orbitron',monospace;font-size:11px;color:var(--accent);box-shadow:var(--glow);animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s forwards;white-space:nowrap}
@keyframes toastIn{from{opacity:0;top:10px}to{opacity:1;top:20px}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

.unlock-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:250;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px}
.unlock-overlay.show{display:flex}
.unlock-icon{font-size:64px;animation:pulse 0.5s ease infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.1)}}
.unlock-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:var(--gold);text-shadow:var(--glow-gold);margin:16px 0 6px;letter-spacing:3px}
.unlock-sub{color:var(--text2);font-size:13px;margin-top:6px;line-height:1.6}
.unlock-amount{font-family:'Orbitron',monospace;font-size:38px;font-weight:900;color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,0.8)}
.unlock-suspended{font-family:'Orbitron',monospace;font-size:18px;color:var(--orange);margin-top:6px}
.unlock-lost{font-family:'Orbitron',monospace;font-size:16px;color:var(--red);margin-top:4px}

.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.6}

.fab{position:fixed;bottom:80px;right:20px;z-index:99;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;color:white;font-size:24px;box-shadow:0 4px 20px rgba(0,212,255,0.4),var(--glow);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
.fab:active{transform:scale(0.93)}

.divider{height:1px;background:var(--border2);margin:14px 0}

.add-ms-btn{background:none;border:1px dashed var(--border);color:var(--text3);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;width:100%;margin-top:6px;transition:all 0.2s}

.milestone-inputs{display:flex;flex-direction:column;gap:8px}
.milestone-input-row{display:flex;gap:6px;align-items:center}
.milestone-input-row .form-input{flex:1}
.remove-ms{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px}

.split-preview{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px;color:var(--text2);line-height:1.8}
.split-preview strong{color:var(--accent);font-family:'Orbitron',monospace;font-size:11px}

select option{background:#0d1f35}

.progress-ring{font-family:'Orbitron',monospace;font-size:11px;color:var(--text3);text-align:right}
.progress-ring.good{color:var(--green)}
.progress-ring.warn{color:var(--orange)}
.progress-ring.bad{color:var(--red)}

.ms-section-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}

.reward-breakdown{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;margin-top:8px;font-size:12px}
.reward-breakdown-row{display:flex;justify-content:space-between;padding:3px 0;color:var(--text2)}
.reward-breakdown-row span:last-child{font-family:'Orbitron',monospace;font-size:11px;color:var(--gold)}
</style>
</head>
<body>
<div id="starfield"></div>

<div class="header">
  <div class="header-top">
    <div class="logo">STELLAR MISSIONS</div>
    <div class="cycle-badge" id="cycleBadge">--</div>
  </div>
  <div class="budget-bar">
    <div class="budget-label">CREDITI</div>
    <div class="budget-track"><div class="budget-fill" id="budgetFill" style="width:0%"></div></div>
    <div class="budget-amount" id="budgetAmount">€-- / €--</div>
  </div>
</div>

<div id="view-missions" class="view active">
  <div id="missionsList"></div>
</div>

<div id="view-stats" class="view">
  <div class="section-title">STATO CICLO</div>
  <div class="stats-grid" id="statsGrid"></div>
  <div id="suspendedSection"></div>
  <div class="section-title">CICLO CORRENTE</div>
  <div class="cycle-card" id="cycleCard"></div>
  <div class="section-title">STORICO</div>
  <div id="historyList"></div>
</div>

<div id="view-settings" class="view">
  <div class="section-title">CONFIGURAZIONE</div>
  <div class="cycle-card">
    <div class="cycle-title">BUDGET MENSILE</div>
    <div class="form-group" style="margin-bottom:10px">
      <label class="form-label">Budget questo ciclo (€)</label>
      <input type="number" class="form-input" id="settingBudget" placeholder="Es. 340" min="1">
      <div class="form-hint" id="suspendedHint"></div>
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">SALVA</button>
  </div>
  <div class="divider"></div>
  <div class="section-title">DATI</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-secondary" onclick="exportData()">ESPORTA JSON</button>
    <button class="btn btn-danger" onclick="resetConfirm()">RESET TOTALE</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showView('missions',this)"><span class="icon">🚀</span>MISSIONI</button>
  <button class="nav-btn" onclick="showView('stats',this)"><span class="icon">📡</span>STATO</button>
  <button class="nav-btn" onclick="showView('settings',this)"><span class="icon">⚙️</span>CONFIG</button>
</nav>

<button class="fab" onclick="openNewMission()">＋</button>

<!-- MODAL BUDGET SETUP -->
<div class="modal-overlay" id="modalBudget">
  <div class="modal">
    <div class="modal-header"><span id="budgetModalTitle">NUOVO CICLO</span></div>
    <div class="modal-body">
      <div class="budget-setup-card">
        <div class="budget-setup-title">⚡ INIZIALIZZAZIONE CICLO</div>
        <div class="budget-setup-sub" id="budgetModalSub">Quanto è il tuo budget per questo ciclo?</div>
      </div>
      <div class="form-group">
        <label class="form-label">Budget base (€)</label>
        <input type="number" class="form-input" id="budgetInput" placeholder="Es. 340" min="1">
      </div>
      <div id="suspendedFromPrev" style="display:none">
        <div class="form-hint" style="color:var(--orange);margin-bottom:10px" id="suspendedFromPrevText"></div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="saveBudgetSetup()">CONFERMA BUDGET</button>
    </div>
  </div>
</div>

<!-- MODAL NUOVA/MODIFICA MISSIONE -->
<div class="modal-overlay" id="modalMission">
  <div class="modal">
    <div class="modal-header">
      <span id="modalMissionTitle">NUOVA MISSIONE</span>
      <button class="modal-close" onclick="closeModal('modalMission')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nome Missione</label>

<script>
// ═══════════════════════════════════════════
// STARFIELD
// ═══════════════════════════════════════════
(function(){
  const sf=document.getElementById('starfield');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    sf.appendChild(s);
  }
})();

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state = {
  missions: [],
  cycles: [],       // { cycleKey, budget, suspendedIn, totalEarned, startDate }
  suspendedCredits: [], // { fromMission, amount, fromCycle, addedToCycle }
  history: [],
  timers: {},
  lastBudgetPrompt: null
};

let editingMissionId = null;
let activeTimerMissionId = null;
let timerInterval = null;

// ═══════════════════════════════════════════
// CYCLE LOGIC (27→26)
// ═══════════════════════════════════════════
function getCycleInfo(date) {
  const d = date || new Date();
  const day = d.getDate(), month = d.getMonth(), year = d.getFullYear();
  let cycleStart, cycleEnd;
  if (day >= 27) {
    cycleStart = new Date(year, month, 27);
    cycleEnd = new Date(year, month + 1, 26);
  } else {
    cycleStart = new Date(year, month - 1, 27);
    cycleEnd = new Date(year, month, 26);
  }
  const totalDays = Math.round((cycleEnd - cycleStart) / 86400000) + 1;
  const elapsed = Math.max(1, Math.round((d - cycleStart) / 86400000) + 1);
  const remaining = totalDays - elapsed + 1;
  const fraction = Math.min(elapsed / totalDays, 1);
  const fmt = dt => `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
  const key = `${cycleStart.getFullYear()}-${String(cycleStart.getMonth()+1).padStart(2,'0')}-${String(cycleStart.getDate()).padStart(2,'0')}`;
  return { cycleStart, cycleEnd, totalDays, elapsed, remaining, fraction, key,
    label: `${fmt(cycleStart)} → ${fmt(cycleEnd)}` };
}

function getCurrentCycle() { return getCycleInfo(new Date()); }

function getCurrentCycleData() {
  const ci = getCurrentCycle();
  return state.cycles.find(c => c.cycleKey === ci.key) || null;
}

function getDaysForFreq(freq, customDays) {
  if (freq === 'weekly') return 7;
  if (freq === 'biweekly') return 14;
  return parseInt(customDays) || 30;
}

// Calculate how a mission's duration splits across cycles
function calcSplit(startDate, durationDays) {
  const start = new Date(startDate);
  const end = new Date(start);
  end.setDate(end.getDate() + durationDays - 1);
  const ci = getCycleInfo(start);
  if (end <= ci.cycleEnd) {
    return [{ cycleKey: ci.key, days: durationDays, fraction: 1 }];
  }
  const daysInCurrent = Math.round((ci.cycleEnd - start) / 86400000) + 1;
  const daysInNext = durationDays - daysInCurrent;
  const ciNext = getCycleInfo(new Date(ci.cycleEnd.getTime() + 86400000));
  return [
    { cycleKey: ci.key, days: daysInCurrent, fraction: daysInCurrent / durationDays },
    { cycleKey: ciNext.key, days: daysInNext, fraction: daysInNext / durationDays }
  ];
}

// ═══════════════════════════════════════════
// PERSIST
// ═══════════════════════════════════════════
function save() { try { localStorage.setItem('stellar_v2', JSON.stringify(state)); } catch(e){} }
function load() {
  try {
    const raw = localStorage.getItem('stellar_v2');
    if (raw) { const parsed = JSON.parse(raw); state = { ...state, ...parsed }; }
  } catch(e) {}
  if (!state.missions) state.missions = [];
  if (!state.cycles) state.cycles = [];
  if (!state.suspendedCredits) state.suspendedCredits = [];
  if (!state.history) state.history = [];
  if (!state.timers) state.timers = {};
}

// ═══════════════════════════════════════════
// BUDGET CHECK
// ═══════════════════════════════════════════
function checkBudgetPrompt() {
  const ci = getCurrentCycle();
  const cycleData = getCurrentCycleData();

  // First ever launch or new cycle started
  if (!cycleData) {
    // Check if there are suspended credits from previous cycle
    const prevSuspended = state.suspendedCredits.filter(s => !s.addedToCycle);
    const prevTotal = prevSuspended.reduce((s, x) => s + x.amount, 0);

    document.getElementById('budgetModalTitle').textContent = 'NUOVO CICLO ' + ci.label;
    document.getElementById('budgetModalSub').textContent =
      `Ciclo ${ci.label}\nQuanto è il tuo budget base per questo mese?`;

    if (prevTotal > 0) {
      document.getElementById('suspendedFromPrev').style.display = 'block';
      document.getElementById('suspendedFromPrevText').textContent =
        `⚡ Hai €${prevTotal} di crediti sospesi dal ciclo precedente che verranno aggiunti automaticamente al budget.`;
    } else {
      document.getElementById('suspendedFromPrev').style.display = 'none';
    }
    document.getElementById('budgetInput').value = '';
    openModal('modalBudget');
    return true;
  }

  // Check if today is 27+ and we haven't prompted for this cycle yet
  const today = new Date();
  const lastPrompt = state.lastBudgetPrompt ? new Date(state.lastBudgetPrompt) : null;
  if (today.getDate() >= 27 && (!lastPrompt || lastPrompt < ci.cycleStart)) {
    // New cycle starting
    const prevSuspended = state.suspendedCredits.filter(s => !s.addedToCycle);
    const prevTotal = prevSuspended.reduce((s, x) => s + x.amount, 0);
    document.getElementById('budgetModalTitle').textContent = 'NUOVO CICLO ' + ci.label;
    document.getElementById('budgetModalSub').textContent = `È il 27! Inizia il nuovo ciclo.\nQuanto è il tuo budget base?`;
    if (prevTotal > 0) {
      document.getElementById('suspendedFromPrev').style.display = 'block';
      document.getElementById('suspendedFromPrevText').textContent =
        `⚡ Verranno aggiunti automaticamente €${prevTotal} di crediti sospesi dal ciclo precedente. Totale disponibile: €${prevTotal} + budget che inserisci.`;
    } else {
      document.getElementById('suspendedFromPrev').style.display = 'none';
    }
    document.getElementById('budgetInput').value = '';
    openModal('modalBudget');
    return true;
  }
  return false;
}

function saveBudgetSetup() {
  const base = parseInt(document.getElementById('budgetInput').value);
  if (!base || base < 1) { toast('Inserisci un budget valido'); return; }

  const ci = getCurrentCycle();
  const prevSuspended = state.suspendedCredits.filter(s => !s.addedToCycle);
  const prevTotal = prevSuspended.reduce((s, x) => s + x.amount, 0);

  // Mark suspended as added
  prevSuspended.forEach(s => s.addedToCycle = ci.key);

  const totalBudget = base + prevTotal;

  // Create or update cycle
  const existing = state.cycles.find(c => c.cycleKey === ci.key);
  if (existing) {
    existing.budget = totalBudget;
    existing.baseBudget = base;
    existing.suspendedIn = prevTotal;
  } else {
    state.cycles.push({
      cycleKey: ci.key,
      label: ci.label,
      budget: totalBudget,
      baseBudget: base,
      suspendedIn: prevTotal,
      startDate: ci.cycleStart.toISOString()
    });
  }

  state.lastBudgetPrompt = new Date().toISOString();
  save();
  closeModal('modalBudget');
  renderAll();
  toast(`Budget ciclo: €${totalBudget} ✓`);
}

function getBudgetAvailable() {
  const cycleData = getCurrentCycleData();
  if (!cycleData) return 0;
  const ci = getCurrentCycle();
  const assigned = state.missions
    .filter(m => !m.completed && !m.expired)
    .filter(m => {
      const split = m.split || [];
      return split.some(s => s.cycleKey === ci.key);
    })
    .reduce((sum, m) => {
      const split = m.split || [];
      const thisSplit = split.find(s => s.cycleKey === ci.key);
      return sum + (thisSplit ? Math.round(m.reward * thisSplit.fraction) : 0);
    }, 0);
  const earned = state.missions
    .filter(m => m.completed)
    .reduce((s, m) => s + (m.earnedAmount || 0), 0);
  return Math.max(0, cycleData.budget - assigned - earned);
}

// ═══════════════════════════════════════════
// XP
// ═══════════════════════════════════════════
function computeXP(m) {
  const msTotal = (m.milestones || []).length;
  const msDone = (m.milestones || []).filter(x => x.done).length;
  const pct = msTotal > 0 ? msDone / msTotal : (m.completed ? 1 : 0);
  return Math.round(pct * 100);
}

function xpToLevel(xp) {
  if (xp >= 100) return { level:'MAX', label:'COMANDANTE', pct:100 };
  if (xp >= 80) return { level:5, label:'CAPITANO', pct:(xp-80)/20*100 };
  if (xp >= 60) return { level:4, label:'UFFICIALE', pct:(xp-60)/20*100 };
  if (xp >= 40) return { level:3, label:'ESPLORATORE', pct:(xp-40)/20*100 };
  if (xp >= 20) return { level:2, label:'RECLUTA', pct:(xp-20)/20*100 };
  return { level:1, label:'INIZIATO', pct:xp/20*100 };
}

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
function getTotalMinutes(missionId) {
  const m = state.missions.find(m => m.id === missionId);
  if (!m) return 0;
  const logged = (m.timeLogs || []).reduce((s, l) => s + l.minutes, 0);
  const live = state.timers[missionId];
  if (live && live.running) return logged + Math.floor((Date.now() - live.startTs) / 60000);
  return logged + (live ? Math.floor((live.accumulated || 0) / 60000) : 0);
}

function formatTime(ms) {
  const ts = Math.floor(ms / 1000);
  const h = Math.floor(ts / 3600), mn = Math.floor((ts % 3600) / 60), s = ts % 60;
  if (h > 0) return `${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatMinutes(min) {
  if (!min) return '0m';
  if (min < 60) return `${min}m`;
  return `${Math.floor(min/60)}h ${min%60}m`;
}

function startTimer(missionId) {
  if (!state.timers[missionId]) state.timers[missionId] = { running:false, startTs:0, accumulated:0 };
  const t = state.timers[missionId];
  if (t.running) return;
  t.running = true; t.startTs = Date.now();
  activeTimerMissionId = missionId;
  save(); tickTimer();
  timerInterval = setInterval(tickTimer, 1000);
}

function pauseTimer(missionId) {
  const t = state.timers[missionId];
  if (!t || !t.running) return;
  t.accumulated += Date.now() - t.startTs;
  t.running = false;
  clearInterval(timerInterval);
  const mins = Math.floor(t.accumulated / 60000);
  if (mins > 0) {
    const m = state.missions.find(m => m.id === missionId);
    if (m) { if (!m.timeLogs) m.timeLogs = []; m.timeLogs.push({ date: today(), minutes: mins, auto: true }); }
    t.accumulated = t.accumulated % 60000;
  }
  activeTimerMissionId = null;
  save(); renderAll();
}

function tickTimer() {
  if (!activeTimerMissionId) return;
  const t = state.timers[activeTimerMissionId];
  if (!t || !t.running) return;
  const elapsed = Date.now() - t.startTs + (t.accumulated || 0);
  const el = document.querySelector(`[data-timer="${activeTimerMissionId}"]`);
  if (el) { el.textContent = formatTime(elapsed); el.className = 'timer-digits running'; }
}

function today() { return new Date().toISOString().split('T')[0]; }

// ═══════════════════════════════════════════
// MISSION COMPLETION LOGIC
// ═══════════════════════════════════════════
function calcCompletionResult(m) {
  const msTotal = (m.milestones || []).length;
  const msDone = (m.milestones || []).filter(x => x.done).length;
  const pct = msTotal > 0 ? msDone / msTotal : 1;
  const reward = m.reward || 0;

  if (pct >= 0.5) {
    const earned = Math.floor(reward * pct);
    const suspended = reward - earned;
    return { earned, suspended, lost: 0, pct };
  } else {
    return { earned: 0, suspended: 0, lost: reward, pct };
  }
}

function completeMission(id) {
  const m = state.missions.find(m => m.id === id);
  if (!m) return;
  if (activeTimerMissionId === id) pauseTimer(id);

  const result = calcCompletionResult(m);
  m.completed = true;
  m.completedAt = new Date().toISOString();
  m.earnedAmount = result.earned;

  const ci = getCurrentCycle();

  if (result.suspended > 0) {
    state.suspendedCredits.push({
      fromMission: m.name,
      amount: result.suspended,
      fromCycle: ci.key,
      addedToCycle: null
    });
  }

  state.history.push({
    id: m.id, name: m.name,
    earned: result.earned,
    suspended: result.suspended,
    lost: result.lost,
    pct: Math.round(result.pct * 100),
    date: new Date().toLocaleDateString('it-IT'),
    cycle: ci.label
  });

  save(); renderAll();
  showUnlock(m, result);
}

function expireMission(id) {
  const m = state.missions.find(m => m.id === id);
  if (!m) return;
  m.expired = true;
  m.expiredAt = new Date().toISOString();
  m.earnedAmount = 0;
  const ci = getCurrentCycle();
  state.history.push({
    id: m.id, name: m.name, earned: 0, suspended: 0, lost: m.reward || 0,
    pct: 0, date: new Date().toLocaleDateString('it-IT'), cycle: ci.label
  });
  save(); renderAll();
  toast('Missione scaduta — premio perso');
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function renderAll() { renderHeader(); renderMissions(); }

function renderHeader() {
  const ci = getCurrentCycle();
  document.getElementById('cycleBadge').textContent = ci.label;
  const cd = getCurrentCycleData();
  const budget = cd ? cd.budget : 0;
  const earned = state.missions.filter(m => m.completed).reduce((s, m) => s + (m.earnedAmount || 0), 0);
  const pct = budget > 0 ? Math.min(earned / budget * 100, 100) : 0;
  document.getElementById('budgetFill').style.width = pct + '%';
  document.getElementById('budgetAmount').textContent = `€${earned} / €${budget || '--'}`;
}

function catClass(cat) { return { asp:'cat-asp', social:'cat-social', '1pct':'cat-1pct' }[cat] || 'cat-asp'; }
function catTagClass(cat) { return { asp:'tag-asp', social:'tag-social', '1pct':'tag-1pct' }[cat] || 'tag-asp'; }
function catTagLabel(cat) { return { asp:'ASP', social:'SOCIAL', '1pct':'1%' }[cat] || cat; }
function freqLabel(freq) { return { weekly:'7 GG', biweekly:'14 GG', multiweek:'PROGETTO' }[freq] || freq; }

function renderMissions() {
  const active = state.missions.filter(m => !m.completed && !m.expired);
  const done = state.missions.filter(m => m.completed);
  const expired = state.missions.filter(m => m.expired);

  let html = '';

  if (!active.length && !done.length && !expired.length) {
    html = `<div class="empty-state"><div class="icon">🛸</div><p>Nessuna missione.<br>Premi + per lanciarne una.</p></div>`;
  } else {
    if (active.length) {
      html += `<div class="section-title">MISSIONI ATTIVE</div>`;
      html += active.map(m => missionCardHTML(m)).join('');
    }
    if (done.length) {
      html += `<div class="section-title" style="margin-top:8px">COMPLETATE</div>`;
      html += done.map(m => missionCardHTML(m)).join('');
    }
    if (expired.length) {
      html += `<div class="section-title" style="margin-top:8px">SCADUTE</div>`;
      html += expired.map(m => missionCardHTML(m)).join('');
    }
  }

  document.getElementById('missionsList').innerHTML = html;

  document.querySelectorAll('.mission-header').forEach(h => {
    h.addEventListener('click', function() {
      const id = this.dataset.id;
      const detail = document.getElementById('detail-' + id);
      if (detail) detail.classList.toggle('open');
    });
  });
}

function missionCardHTML(m) {
  const xp = computeXP(m);
  const lvl = xpToLevel(xp);
  const totalMin = getTotalMinutes(m.id);
  const t = state.timers[m.id];
  const isRunning = t && t.running;
  const elapsed = isRunning ? Date.now() - t.startTs + (t.accumulated || 0) : (t ? (t.accumulated || 0) : 0);
  const msTotal = (m.milestones || []).length;
  const msDone = (m.milestones || []).filter(x => x.done).length;
  const isRecurring = m.missionType === 'recurring';

  const statusClass = m.completed ? 'completed' : m.expired ? 'expired' : '';

  // Milestone section
  let msHTML = '';
  if (msTotal > 0) {
    const pct = Math.round(msDone / msTotal * 100);
    const pctClass = pct >= 50 ? 'good' : pct > 0 ? 'warn' : 'bad';
    msHTML = `
    <div class="milestones">
      <div class="ms-section-label">${isRecurring ? 'OCCORRENZE GIORNALIERE' : 'TAPPE'} — <span class="${pctClass}" style="font-family:'Orbitron',monospace;font-size:10px">${msDone}/${msTotal} (${pct}%)</span></div>
      ${m.milestones.map((ms, i) => `
        <div class="milestone-item" onclick="${(!m.completed && !m.expired) ? `toggleMilestone('${m.id}',${i})` : ''}">
          <div class="ms-check ${ms.done ? 'done' : ''}">✓</div>
          <div class="ms-label ${ms.done ? 'done' : ''}">${ms.text}</div>
          ${ms.doneAt ? `<div class="ms-date">${ms.doneAt}</div>` : ''}
        </div>
      `).join('')}
    </div>`;
  }

  // Reward preview
  const ci = getCurrentCycle();
  const split = m.split || [];
  const thisSplit = split.find(s => s.cycleKey === ci.key);
  const rewardThisCycle = thisSplit ? Math.round(m.reward * thisSplit.fraction) : (m.reward || 0);

  let rewardBadge = `€${m.reward || 0}`;
  if (split.length > 1) rewardBadge = `€${rewardThisCycle} <span style="font-size:9px;color:var(--text3)">(ciclo)</span>`;

  // Status tag
  let statusTag = '';
  if (m.completed) statusTag = `<span class="tag" style="background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2)">✓ OK</span>`;
  else if (m.expired) statusTag = `<span class="tag tag-expired">SCADUTA</span>`;

  return `
  <div class="mission-card ${catClass(m.cat)} ${statusClass}">
    <div class="mission-header" data-id="${m.id}">
      <div class="mission-info">
        <div class="mission-name">${m.name}</div>
        <div class="mission-meta">
          <span class="tag ${catTagClass(m.cat)}">${catTagLabel(m.cat)}</span>
          <span class="tag tag-freq">${freqLabel(m.freq)}</span>
          ${isRecurring ? '<span class="tag tag-suspended">RICORRENTE</span>' : ''}
          ${statusTag}
          ${msTotal > 0 ? `<span style="font-size:10px;color:var(--text3)">${msDone}/${msTotal}</span>` : ''}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="mission-reward">${rewardBadge}</div>
        <div class="progress-ring ${xp>=50?'good':xp>0?'warn':'bad'}" style="margin-top:2px">${xp}% XP</div>
      </div>
    </div>
    <div class="mission-xp">
      <div class="xp-row">
        <span class="xp-label">${lvl.label}</span>
        <span class="xp-level">LV ${lvl.level}</span>
      </div>
      <div class="xp-track"><div class="xp-fill" style="width:${lvl.pct}%"></div></div>
    </div>
    <div class="mission-detail" id="detail-${m.id}">
      ${m.desc ? `<div class="detail-row"><span class="detail-key">Obiettivo</span><span class="detail-val" style="font-family:'Rajdhani';font-size:13px;max-width:60%;text-align:right">${m.desc}</span></div>` : ''}
      <div class="detail-row"><span class="detail-key">Tempo</span><span class="detail-val">${formatMinutes(totalMin)}</span></div>
      <div class="detail-row"><span class="detail-key">Premio totale</span><span class="detail-val" style="color:var(--gold)">€${m.reward || 0}</span></div>
      ${split.length > 1 ? `<div class="reward-breakdown">
        ${split.map(s => `<div class="reward-breakdown-row"><span>Ciclo ${s.cycleKey.substring(5)}</span><span>€${Math.round(m.reward * s.fraction)} (${Math.round(s.fraction*100)}%)</span></div>`).join('')}
      </div>` : ''}
      ${msHTML}
      ${!m.completed && !m.expired ? `
      <div class="timer-display">
        <div class="timer-digits ${isRunning?'running':''}" data-timer="${m.id}">${formatTime(elapsed)}</div>
        <div class="timer-btns">
          ${isRunning
            ? `<button class="btn btn-secondary btn-sm" onclick="pauseTimer('${m.id}')">⏸ PAUSA</button>`
            : `<button class="btn btn-primary btn-sm" onclick="startTimer('${m.id}')">▶ START</button>`}
        </div>
      </div>
      <div class="action-row">
        <button class="btn btn-secondary btn-sm" onclick="openTimeModal('${m.id}')">+ TEMPO</button>
        <button class="btn btn-success btn-sm" onclick="completeMission('${m.id}')">🏆 COMPLETA</button>
        <button class="btn btn-danger btn-sm" onclick="expireMission('${m.id}')">💀 SCADUTA</button>
        <button class="btn btn-secondary btn-sm" onclick="editMission('${m.id}')">✎</button>
      </div>` : ''}
      ${m.completed ? `
      <div class="action-row">
        <div style="font-size:12px;color:var(--green)">✓ Guadagnato: €${m.earnedAmount || 0}</div>
        <button class="btn btn-danger btn-sm" onclick="deleteMissionById('${m.id}')">🗑</button>
      </div>` : ''}
      ${m.expired ? `
      <div class="action-row">
        <div style="font-size:12px;color:var(--red)">Premio perso: €${m.reward || 0}</div>
        <button class="btn btn-danger btn-sm" onclick="deleteMissionById('${m.id}')">🗑</button>
      </div>` : ''}
    </div>
  </div>`;
}

function renderStats() {
  const ci = getCurrentCycle();
  const cd = getCurrentCycleData();
  const budget = cd ? cd.budget : 0;
  const earned = state.missions.filter(m => m.completed).reduce((s, m) => s + (m.earnedAmount || 0), 0);
  const active = state.missions.filter(m => !m.completed && !m.expired).length;
  const done = state.missions.filter(m => m.completed).length;
  const totalMin = state.missions.reduce((s, m) => s + getTotalMinutes(m.id), 0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:var(--gold)">€${earned}</div><div class="stat-label">Crediti Guadagnati</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--text2)">€${budget}</div><div class="stat-label">Budget Ciclo</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${done}</div><div class="stat-label">Completate</div></div>
    <div class="stat-card"><div class="stat-val">${formatMinutes(totalMin)}</div><div class="stat-label">Tempo Totale</div></div>
  `;

  // Suspended credits
  const pending = state.suspendedCredits.filter(s => !s.addedToCycle);
  const suspEl = document.getElementById('suspendedSection');
  if (pending.length > 0) {
    const tot = pending.reduce((s, x) => s + x.amount, 0);
    suspEl.innerHTML = `
      <div class="section-title">CREDITI SOSPESI</div>
      <div class="suspended-card">
        <div class="suspended-title">⏳ IN ATTESA — Disponibili al prossimo 27</div>
        ${pending.map(s => `<div class="suspended-item"><span style="color:var(--text2)">${s.fromMission}</span><span class="suspended-amount">€${s.amount}</span></div>`).join('')}
        <div class="suspended-item" style="border-top:1px solid rgba(255,149,0,0.3);padding-top:8px;margin-top:4px"><span style="font-weight:700">TOTALE SOSPESO</span><span class="suspended-amount" style="font-size:16px">€${tot}</span></div>
      </div>`;
  } else {
    suspEl.innerHTML = '';
  }

  document.getElementById('cycleCard').innerHTML = `
    <div class="cycle-title">CICLO ${ci.label}</div>
    <div class="cycle-row"><span class="detail-key">Giorni trascorsi</span><span class="detail-val">${ci.elapsed} / ${ci.totalDays}</span></div>
    <div class="cycle-row"><span class="detail-key">Giorni rimasti</span><span class="detail-val">${ci.remaining}</span></div>
    <div class="cycle-row"><span class="detail-key">Budget totale</span><span class="detail-val" style="color:var(--gold)">€${budget}</span></div>
    ${cd && cd.suspendedIn > 0 ? `<div class="cycle-row"><span class="detail-key">Di cui sospesi prev.</span><span class="detail-val" style="color:var(--orange)">€${cd.suspendedIn}</span></div>` : ''}
    <div class="cycle-row"><span class="detail-key">Guadagnato</span><span class="detail-val" style="color:var(--green)">€${earned}</span></div>
    <div class="cycle-row"><span class="detail-key">Residuo</span><span class="detail-val">€${Math.max(0, budget - earned)}</span></div>
  `;

  const histEl = document.getElementById('historyList');
  if (!state.history.length) {
    histEl.innerHTML = '<div style="color:var(--text3);font-size:12px">Nessuna missione completata ancora.</div>';
  } else {
    histEl.innerHTML = state.history.slice().reverse().map(h => `
      <div class="history-item">
        <div>
          <div class="history-name">${h.name}</div>
          <div class="history-meta">${h.date} · ${h.cycle} · ${h.pct}%</div>
          ${h.suspended > 0 ? `<div style="font-size:10px;color:var(--orange)">+€${h.suspended} sospesi</div>` : ''}
        </div>
        <div class="history-reward ${h.earned===0?'lost':''}" >
          ${h.earned > 0 ? `+€${h.earned}` : h.lost > 0 ? `−€${h.lost}` : '€0'}
        </div>
      </div>`).join('');
  }
}

function renderSettings() {
  const cd = getCurrentCycleData();
  document.getElementById('settingBudget').value = cd ? cd.budget : '';
  const pending = state.suspendedCredits.filter(s => !s.addedToCycle);
  const tot = pending.reduce((s, x) => s + x.amount, 0);
  document.getElementById('suspendedHint').textContent = tot > 0
    ? `⚡ Hai €${tot} di crediti sospesi da aggiungere al prossimo ciclo.` : '';
}

// ═══════════════════════════════════════════
// MODAL MISSIONE
// ═══════════════════════════════════════════
function openNewMission() {
  const cd = getCurrentCycleData();
  if (!cd) { toast('Prima configura il budget del ciclo in CONFIG'); return; }
  editingMissionId = null;
  document.getElementById('modalMissionTitle').textContent = 'NUOVA MISSIONE';
  document.getElementById('mName').value = '';
  document.getElementById('mCat').value = 'asp';
  document.getElementById('mType').value = 'oneshot';
  document.getElementById('mFreq').value = 'weekly';
  document.getElementById('mDesc').value = '';
  document.getElementById('mReward').value = '';
  document.getElementById('milestoneInputs').innerHTML = '';
  document.getElementById('deleteMissionBtn').style.display = 'none';
  document.getElementById('customDaysGroup').style.display = 'none';
  document.getElementById('splitPreview').style.display = 'none';
  document.getElementById('rewardHint').textContent = '';
  updateBudgetResidualHint();
  onTypeChange();
  openModal('modalMission');
}

function updateBudgetResidualHint() {
  const avail = getBudgetAvailable();
  document.getElementById('budgetResidualHint').textContent = `— Disponibile: €${avail}`;
}

function onTypeChange() {
  const t = document.getElementById('mType').value;
  const freq = document.getElementById('mFreq').value;
  if (t === 'recurring') {
    // For recurring, milestones are auto-generated from duration
    document.getElementById('oneshotMilestones').style.display = 'none';
  } else {
    document.getElementById('oneshotMilestones').style.display = 'block';
  }
  onFreqChange();
}

function onFreqChange() {
  const freq = document.getElementById('mFreq').value;
  document.getElementById('customDaysGroup').style.display = freq === 'multiweek' ? 'block' : 'none';
  onRewardChange();
}

function onRewardChange() {
  const reward = parseInt(document.getElementById('mReward').value) || 0;
  const freq = document.getElementById('mFreq').value;
  const customDays = document.getElementById('mCustomDays').value;
  const days = getDaysForFreq(freq, customDays);
  const avail = getBudgetAvailable();
  const hintEl = document.getElementById('rewardHint');
  const splitEl = document.getElementById('splitPreview');

  if (reward > avail && avail > 0) {
    hintEl.textContent = `⚠ Supera il disponibile (€${avail})`;
    hintEl.className = 'form-hint warning';
  } else if (reward > 0) {
    hintEl.textContent = `✓ Residuo dopo: €${avail - reward}`;
    hintEl.className = 'form-hint';
  } else {
    hintEl.textContent = '';
  }

  // Check split
  const startDate = new Date().toISOString();
  const split = calcSplit(startDate, days);
  if (split.length > 1 && reward > 0) {
    splitEl.style.display = 'block';
    splitEl.innerHTML = `<strong>⚡ PROGETTO MULTI-CICLO</strong><br>` +
      split.map(s => `Ciclo ${s.cycleKey.substring(5)}: ${s.days} giorni → <strong>€${Math.round(reward * s.fraction)}</strong>`).join('<br>');
  } else {
    splitEl.style.display = 'none';
  }
}

function addMilestoneInput(val = '') {
  const div = document.createElement('div');
  div.className = 'milestone-input-row';
  div.innerHTML = `<input class="form-input" type="text" placeholder="Es. Prima bozza completata" value="${val}"><button class="remove-ms" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('milestoneInputs').appendChild(div);
}

function editMission(id) {
  const m = state.missions.find(m => m.id === id);
  if (!m) return;
  editingMissionId = id;
  document.getElementById('modalMissionTitle').textContent = 'MODIFICA MISSIONE';
  document.getElementById('mName').value = m.name;
  document.getElementById('mCat').value = m.cat;
  document.getElementById('mType').value = m.missionType || 'oneshot';
  document.getElementById('mFreq').value = m.freq;
  document.getElementById('mDesc').value = m.desc || '';
  document.getElementById('mReward').value = m.reward || '';
  document.getElementById('milestoneInputs').innerHTML = '';
  if (m.missionType !== 'recurring') {
    (m.milestones || []).forEach(ms => addMilestoneInput(ms.text));
  }
  document.getElementById('deleteMissionBtn').style.display = 'block';
  onTypeChange();
  updateBudgetResidualHint();
  openModal('modalMission');
}

function saveMission() {
  const name = document.getElementById('mName').value.trim();
  if (!name) { toast('Inserisci il nome'); return; }
  const reward = parseInt(document.getElementById('mReward').value);
  if (!reward || reward < 1) { toast('Inserisci il premio in €'); return; }
  const avail = getBudgetAvailable();
  if (!editingMissionId && reward > avail) {
    if (!confirm(`Il premio (€${reward}) supera il budget disponibile (€${avail}). Continuare?`)) return;
  }
  const cat = document.getElementById('mCat').value;
  const missionType = document.getElementById('mType').value;
  const freq = document.getElementById('mFreq').value;
  const customDays = document.getElementById('mCustomDays').value;
  const desc = document.getElementById('mDesc').value.trim();
  const days = getDaysForFreq(freq, customDays);
  const startDate = new Date().toISOString();
  const split = calcSplit(startDate, days);

  let milestones;
  if (missionType === 'recurring') {
    // Generate one milestone per day
    milestones = Array.from({ length: days }, (_, i) => {
      const d = new Date();
      d.setDate(d.getDate() + i);
      const label = d.toLocaleDateString('it-IT', { weekday: 'short', day: '2-digit', month: '2-digit' });
      return { text: label, done: false, doneAt: null };
    });
  } else {
    milestones = Array.from(document.querySelectorAll('#milestoneInputs .form-input'))
      .map(i => i.value.trim()).filter(Boolean)
      .map(text => ({ text, done: false, doneAt: null }));
  }

  if (editingMissionId) {
    const m = state.missions.find(m => m.id === editingMissionId);
    if (m) {
      m.name = name; m.cat = cat; m.missionType = missionType;
      m.freq = freq; m.desc = desc; m.reward = reward; m.split = split;
      if (missionType !== 'recurring') {
        m.milestones = milestones.map((ms, i) => ({
          ...ms, done: (m.milestones || [])[i] ? m.milestones[i].done : false,
          doneAt: (m.milestones || [])[i] ? m.milestones[i].doneAt : null
        }));
      }
    }
  } else {
    const id = 'm_' + Date.now();
    state.missions.push({
      id, name, cat, missionType, freq, desc, reward, split, milestones,
      completed: false, expired: false, timeLogs: [],
      createdAt: startDate, durationDays: days
    });
  }

  save(); closeModal('modalMission'); renderAll();
  toast('Missione salvata ✓');
}

function deleteMission() {
  if (!editingMissionId) return;
  if (!confirm('Eliminare?')) return;
  deleteMissionById(editingMissionId);
  closeModal('modalMission');
}

function deleteMissionById(id) {
  state.missions = state.missions.filter(m => m.id !== id);
  delete state.timers[id];
  save(); renderAll(); toast('Eliminata');
}

function toggleMilestone(missionId, idx) {
  const m = state.missions.find(m => m.id === missionId);
  if (!m || !m.milestones[idx]) return;
  m.milestones[idx].done = !m.milestones[idx].done;
  m.milestones[idx].doneAt = m.milestones[idx].done ? today() : null;
  save(); renderAll();
}

// ═══════════════════════════════════════════
// UNLOCK
// ═══════════════════════════════════════════
function showUnlock(m, result) {
  document.getElementById('unlockMissionName').textContent = m.name.toUpperCase();
  if (result.earned > 0) {
    document.getElementById('unlockIcon').textContent = '🏆';
    document.getElementById('unlockTitle').textContent = 'MISSIONE COMPLETATA';
    document.getElementById('unlockAmount').textContent = `+€${result.earned}`;
    document.getElementById('unlockAmount').style.color = 'var(--gold)';
    document.getElementById('unlockSub').textContent = result.earned > 0 ? 'Crediti sbloccati → Revolut' : '';
  } else {
    document.getElementById('unlockIcon').textContent = '💀';
    document.getElementById('unlockTitle').textContent = 'PREMIO PERSO';
    document.getElementById('unlockAmount').textContent = `€0`;
    document.getElementById('unlockAmount').style.color = 'var(--red)';
    document.getElementById('unlockSub').textContent = 'Meno del 50% completato';
  }
  const suspEl = document.getElementById('unlockSuspended');
  if (result.suspended > 0) {
    suspEl.style.display = 'block';
    suspEl.textContent = `⏳ €${result.suspended} sospesi → prossimo ciclo`;
  } else { suspEl.style.display = 'none'; }
  const lostEl = document.getElementById('unlockLost');
  if (result.lost > 0) {
    lostEl.style.display = 'block';
    lostEl.textContent = `❌ €${result.lost} persi definitivamente`;
  } else { lostEl.style.display = 'none'; }
  document.getElementById('unlockOverlay').classList.add('show');
}
function closeUnlock() { document.getElementById('unlockOverlay').classList.remove('show'); }

// ═══════════════════════════════════════════
// TIME LOG
// ═══════════════════════════════════════════
function openTimeModal(id) {
  const m = state.missions.find(m => m.id === id);
  document.getElementById('timeModalName').textContent = m ? m.name : '';
  document.getElementById('timeMinutes').value = '';
  document.getElementById('timeDate').value = today();
  document.getElementById('modalTime').dataset.missionId = id;
  openModal('modalTime');
}
function saveTimeLog() {
  const id = document.getElementById('modalTime').dataset.missionId;
  const mins = parseInt(document.getElementById('timeMinutes').value);
  const date = document.getElementById('timeDate').value || today();
  if (!mins || mins < 1) { toast('Inserisci i minuti'); return; }
  const m = state.missions.find(m => m.id === id);
  if (!m) return;
  if (!m.timeLogs) m.timeLogs = [];
  m.timeLogs.push({ date, minutes: mins, auto: false });
  save(); closeModal('modalTime'); renderAll();
  toast(`${mins} minuti registrati ✓`);
}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
function saveSettings() {
  const b = parseInt(document.getElementById('settingBudget').value);
  if (!b || b < 1) return;
  const ci = getCurrentCycle();
  const existing = state.cycles.find(c => c.cycleKey === ci.key);
  if (existing) { existing.budget = b; }
  else { state.cycles.push({ cycleKey: ci.key, label: ci.label, budget: b, baseBudget: b, suspendedIn: 0, startDate: ci.cycleStart.toISOString() }); }
  state.lastBudgetPrompt = new Date().toISOString();
  save(); renderAll(); toast('Salvato ✓');
}
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `stellar_${today()}.json`;
  a.click();
}
function resetConfirm() {
  if (confirm('Cancellare TUTTI i dati?')) {
    localStorage.removeItem('stellar_v2');
    state = { missions:[], cycles:[], suspendedCredits:[], history:[], timers:{}, lastBudgetPrompt:null };
    renderAll(); checkBudgetPrompt(); toast('Reset completato');
  }
}

// ═══════════════════════════════════════════
// NAV & MODAL
// ═══════════════════════════════════════════
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'stats') renderStats();
  if (name === 'settings') renderSettings();
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toast(msg) {
  const ex = document.querySelector('.toast'); if (ex) ex.remove();
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2900);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
load();
Object.keys(state.timers).forEach(id => {
  const t = state.timers[id];
  if (t && t.running) { activeTimerMissionId = id; timerInterval = setInterval(tickTimer, 1000); }
});
renderAll();
checkBudgetPrompt();
setInterval(() => { if (activeTimerMissionId) tickTimer(); }, 1000);
</script>
